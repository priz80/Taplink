<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taplink</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/font.css">
  </head>
  <body>
    <main>
      <div class="fon"></div>
      <div class="content">
        <h1>Привет! <span class="greeting-icon">👋</span><br>Делаю сайты на заказ.</h1>
        <div class="header">
          <div class="avatar"></div>
          <h2>Игорь Черненко</h2>
          <p class="position">IT developer</p>
        </div>
        <div class="social">
          <div class="social-buttons">
            <div class="block-buttons">
              <a
                href="https://vk.com/ichernenko75"
                class="vk"
                aria-label="Вконтакте"
                target="_blank"
                rel="noopener noreferrer"
              ></a>
              <a
                href="https://t.me/Igor_chernenko"
                class="tg"
                aria-label="Telegram"
                target="_blank"
                rel="noopener noreferrer"
              ></a>
            </div>
            <a
              href="https://github.com/priz80"
              class="gh"
              aria-label="GitHub"
              target="_blank"
              rel="noopener noreferrer"
            ></a>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <p>© 2026</p>
    </footer>
  </body>
</html>
